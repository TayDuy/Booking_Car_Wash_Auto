spring:
datasource:
url: jdbc:sqlserver://localhost:1433;databaseName=autowash_db;encrypt=false;trustServerCertificate=true
username: sa
password: your_password
driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver
jpa:
show-sql: true
hibernate:
ddl-auto: update
properties:
hibernate.dialect: org.hibernate.dialect.SQLServerDialect
hibernate.format_sql: true   # ← viết phẳng, tránh lặp key "hibernate"