spring.application.name=backend
app.jwt.secret=${JWT_SECRET}
#cấp token thường sử dụng trong 15 phút
app.jwt.expiration-ms=900000
#Refresh token sống trong 7 ngày
app.jwt.refresh-expiration-ms=604800000

# Server port (Render sẽ gán port qua biến môi trường)
server.port=${PORT:8080}

# PostgreSQL Supabase
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.dqkwefcxezdgddobgffv
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}

# Supabase Configuration
supabase.url=https://dqkwefcxezdgddobgffv.supabase.co
supabase.anon-key=${SUPABASE_ANON_KEY}