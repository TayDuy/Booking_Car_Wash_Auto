spring.application.name=backend
spring.config.import=optional:file:.env[.properties]
app.jwt.secret=${JWT_SECRET:}
#cấp token thường sử dụng trong 15 phút
app.jwt.expiration-ms=900000
#Refresh token sống trong 7 ngày
app.jwt.refresh-expiration-ms=604800000

# Server port (Render sẽ gán port qua biến môi trường)
server.port=${PORT:8080}

# PostgreSQL Supabase
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.dqkwefcxezdgddobgffv
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# Tắt open-in-view: mỗi request KHÔNG giữ kết nối DB suốt vòng đời HTTP request.
# Quan trọng với SSE vì SSE là long-lived connection — nếu để true thì SSE sẽ
# chiếm hết connection pool và làm toàn bộ hệ thống bị treo.
spring.jpa.open-in-view=false

# HikariCP — tăng pool size để tránh cạn kiệt kết nối khi có nhiều request đồng thời
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.keepalive-time=60000

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}

# OTP — in OTP code ra console khi dev (tắt ở production)
app.otp.log-code=${OTP_LOG_CODE:false}

