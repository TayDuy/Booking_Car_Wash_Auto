spring.application.name=backend
spring.config.import=optional:file:.env[.properties]
app.jwt.secret=${JWT_SECRET:}
#cấp token thường sử dụng trong 1 tiếng (test đỡ bị out giữa chừng)
app.jwt.expiration-ms=3600000
#Refresh token sống trong 7 ngày
app.jwt.refresh-expiration-ms=604800000

# Server port (Render sẽ gán port qua biến môi trường)
server.port=${PORT:8080}

# PostgreSQL Supabase
spring.datasource.url=jdbc:postgresql://aws-1-ap-southeast-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
spring.datasource.username=postgres.dqkwefcxezdgddobgffv
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
# Tắt open-in-view: mỗi request KHÔNG giữ kết nối DB suốt vòng đời HTTP request.
# Quan trọng với SSE vì SSE là long-lived connection — nếu để true thì SSE sẽ
# chiếm hết connection pool và làm toàn bộ hệ thống bị treo.
spring.jpa.open-in-view=false

# HikariCP — tăng pool size để tránh cạn kiệt kết nối khi có nhiều request đồng thời
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.keepalive-time=60000

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174}

# Cookie chứa refreshToken (HttpOnly).
# LOCAL (http, cùng localhost khác port): COOKIE_SECURE=false, COOKIE_SAME_SITE=Lax là đủ.
# PRODUCTION trên Render + frontend khác domain (Vercel/Netlify...): BẮT BUỘC
#   COOKIE_SECURE=true và COOKIE_SAME_SITE=None (nếu để Lax/Strict, cookie sẽ
#   không được trình duyệt gửi kèm request cross-site -> /auth/refresh luôn fail).
# Lưu ý: SameSite=None bắt buộc phải đi kèm Secure=true, nếu không trình duyệt sẽ từ chối set cookie.
app.cookie.secure=${COOKIE_SECURE:false}
app.cookie.same-site=${COOKIE_SAME_SITE:Lax}

# OTP — in OTP code ra console khi dev (tắt ở production)
app.otp.log-code=${OTP_LOG_CODE:false}

# Supabase Configuration
supabase.url=https://dqkwefcxezdgddobgffv.supabase.co
supabase.anon-key=${SUPABASE_ANON_KEY:placeholder_anon_key}

# Mail Configuration (Gmail SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:washflow_placeholder@gmail.com}
spring.mail.password=${MAIL_PASSWORD:placeholder_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.debug=${MAIL_DEBUG:false}
spring.mail.properties.mail.smtp.connectiontimeout=3000
spring.mail.properties.mail.smtp.timeout=3000
spring.mail.properties.mail.smtp.writetimeout=3000

# VNPay Configuration
app.vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
app.vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:8080/api/v1/payments/vnpay-return}
app.vnpay.tmn-code=${VNPAY_TMN_CODE:}
app.vnpay.hash-secret=${VNPAY_HASH_SECRET:}
app.vnpay.api-url=${VNPAY_API_URL:https://sandbox.vnpayment.vn/merchant_webapi/api/transaction}
# Google Gemini API — dùng cho khung chat trợ giúp AI (/api/v1/support/chat)
# Free tier, không cần thẻ tín dụng. Tạo key tại: https://aistudio.google.com/apikey
# KHÔNG hard-code key thật ở đây. Đặt biến môi trường GEMINI_API_KEY khi chạy/deploy.
gemini.api-key=${GEMINI_API_KEY:}

spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# PayPal Configuration
app.paypal.client-id=${PAYPAL_CLIENT_ID:}
app.paypal.client-secret=${PAYPAL_CLIENT_SECRET:}
app.paypal.mode=${PAYPAL_MODE:sandbox}
app.paypal.currency=USD
app.paypal.return-url=${PAYPAL_RETURN_URL:http://localhost:8080/api/v1/payments/paypal-return}
app.paypal.cancel-url=${PAYPAL_CANCEL_URL:http://localhost:8080/api/v1/payments/paypal-cancel}

app.frontend-base-url=${FRONTEND_BASE_URL:http://localhost:5173}