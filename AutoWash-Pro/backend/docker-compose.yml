services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autowash-backend
    ports:
      - "8080:8080"
    environment:
      - OTP_LOG_CODE=true
    env_file:
      - .env
    restart: unless-stopped
    dns:
      - 8.8.8.8
      - 1.1.1.1
    networks:
      - autowash-net

networks:
  autowash-net:
    driver: bridge
