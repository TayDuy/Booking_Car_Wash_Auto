<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="100%" height="100%">
  <!-- Background -->
  <rect width="800" height="800" fill="#0b0c10" />

  <!-- Definitions for Gradients and Filters -->
  <defs>
    <!-- Water Drop Gradient -->
    <linearGradient id="dropGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff" />
      <stop offset="60%" stop-color="#0055ff" />
      <stop offset="100%" stop-color="#0022aa" />
    </linearGradient>

    <!-- Water Drop Highlight Gradient -->
    <linearGradient id="highlightGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0" />
    </linearGradient>

    <!-- Swoosh Gradient -->
    <linearGradient id="swooshGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0055ff" />
      <stop offset="50%" stop-color="#00d4ff" />
      <stop offset="100%" stop-color="#33ffff" />
    </linearGradient>

    <!-- Car Body Gradient -->
    <linearGradient id="carGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0033cc" />
      <stop offset="70%" stop-color="#0066ff" />
      <stop offset="100%" stop-color="#00a3ff" />
    </linearGradient>

    <!-- Shadow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(0, 0)">
    <!-- 1. WATER DROP (Background Layer) -->
    <!-- Teardrop shape centered at X=400, Y=380, height from Y=180 to Y=480 -->
    <path id="water-drop" d="M 400 170 
             C 320 280, 240 370, 270 450 
             C 290 490, 340 510, 400 510 
             C 460 510, 510 490, 530 450 
             C 560 370, 480 280, 400 170 Z" 
          fill="url(#dropGrad)" />

    <!-- Water Drop Left Inner Highlight -->
    <path id="water-drop-highlight" d="M 400 190 
             C 340 290, 275 370, 295 440 
             C 310 475, 350 490, 400 490 
             C 360 490, 325 470, 320 440 
             C 305 380, 360 300, 400 190 Z" 
          fill="url(#highlightGrad)" />

    <!-- 2. CAR BODY (Middle Layer) -->
    <!-- Car body with cutout wheel arches and window space -->
    <path id="car-body" d="M 180 500 
             C 170 500, 160 510, 160 520
             C 160 540, 180 560, 210 560
             H 230
             C 230 520, 330 520, 330 560
             H 570
             C 570 520, 670 520, 670 560
             H 700
             C 730 560, 750 545, 750 525
             C 750 510, 720 495, 680 480
             C 610 455, 520 440, 460 440
             C 380 440, 290 455, 230 480
             C 200 490, 190 500, 180 500 Z" 
          fill="url(#carGrad)" />

    <!-- Windows (Dark transparent glass on top of car body) -->
    <!-- This sits in the middle of the car body -->
    <path id="car-windows" d="M 330 455 
             C 370 448, 440 448, 480 452 
             C 490 453, 500 460, 495 470 
             C 490 480, 450 485, 410 485 
             C 360 485, 335 480, 325 472 
             C 320 465, 325 456, 330 455 Z" 
          fill="#0b0c10" />
    
    <!-- Window Pillar -->
    <path d="M 410 452 L 415 485" stroke="url(#carGrad)" stroke-width="6" />

    <!-- 3. WHEELS -->
    <g id="wheel-rear">
      <!-- Outer Tire -->
      <circle cx="280" cy="560" r="50" fill="#0b0c10" stroke="url(#carGrad)" stroke-width="8" />
      <!-- Rim -->
      <circle cx="280" cy="560" r="22" fill="#00d4ff" />
      <!-- Hub -->
      <circle cx="280" cy="560" r="9" fill="#0b0c10" />
    </g>

    <g id="wheel-front">
      <!-- Outer Tire -->
      <circle cx="620" cy="560" r="50" fill="#0b0c10" stroke="url(#carGrad)" stroke-width="8" />
      <!-- Rim -->
      <circle cx="620" cy="560" r="22" fill="#00d4ff" />
      <!-- Hub -->
      <circle cx="620" cy="560" r="9" fill="#0b0c10" />
    </g>

    <!-- 4. SWOOSH / WAVE (Foremost Layer) -->
    <!-- Sweeps from rear-left, down across the side, up around the right of the water drop -->
    <path id="swoosh-main" d="M 210 500
             C 250 515, 320 535, 420 535
             C 550 535, 660 480, 710 400
             C 745 340, 715 280, 640 280
             C 590 280, 540 310, 510 350
             C 540 320, 580 300, 620 300
             C 680 300, 710 340, 680 390
             C 640 450, 540 505, 420 505
             C 320 505, 250 490, 210 470 Z" 
          fill="url(#swooshGrad)" filter="url(#glow)" />

    <!-- Secondary Upper Swoosh Accent -->
    <path id="swoosh-accent" d="M 520 320
             C 550 285, 600 260, 660 260
             C 680 260, 695 265, 700 275
             C 700 285, 680 290, 660 290
             C 610 290, 570 310, 540 340 Z" 
          fill="#33ffff" opacity="0.8" />
  </g>
</svg>
