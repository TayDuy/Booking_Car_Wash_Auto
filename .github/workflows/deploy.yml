name: Deploy Backend to EC2
on:
  push:
    branches:
      - main
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: AutoWash-Pro/backend
        run: |
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Rename jar
        working-directory: AutoWash-Pro/backend
        run: cp target/*.jar app.jar

      - name: Upload jar as artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: AutoWash-Pro/backend/app.jar
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download jar artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: AutoWash-Pro/backend

      - name: Copy jar to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "AutoWash-Pro/backend/app.jar"
          target: "~/Booking_Car_Wash_Auto/AutoWash-Pro/backend"
          strip_components: 2

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "=== Deploying to EC2 ==="
            cd ~/Booking_Car_Wash_Auto
            echo "Updating source code..."
            git fetch origin
            git checkout main
            git reset --hard origin/main
            git clean -fd -e AutoWash-Pro/backend/app.jar
            echo "Moving to backend..."
            cd AutoWash-Pro/backend
            echo "app.jar already uploaded via scp"
            ls -lh app.jar
            echo "Stopping old containers..."
            docker-compose down || true
            echo "Building Docker image..."
            docker-compose build --no-cache
            echo "Starting containers..."
            docker-compose up -d
            echo "Cleaning Docker images..."
            docker image prune -f
            echo "=== Deployment completed successfully! ==="